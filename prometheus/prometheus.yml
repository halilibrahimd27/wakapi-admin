global:
  scrape_interval: 1m
  evaluation_interval: 1m

scrape_configs:
  - job_name: 'wakapi'
    scrape_interval: 1m
    metrics_path: '/api/metrics'
    # Wakapi metrics token — repository'ye commitlemeyin.
    # Çalıştırmadan önce ./prometheus/wakapi.token dosyasını oluşturun ve
    # Wakapi -> Settings -> Integrations'tan aldığınız token'ı içine yazın.
    bearer_token_file: /etc/prometheus/wakapi.token
    static_configs:
      - targets: ['wakapi:3000']
